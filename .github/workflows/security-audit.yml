name: Scheduled security audit

on:
  schedule:
    - cron: "0 18 * * 0"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Static security check
        run: npm run security:check

      - name: Commercial launch check
        run: npm run launch:check

      - name: Supabase boundary check
        run: npm run security:supabase
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          SUPABASE_SECURITY_TEST_EDGE: "true"

      - name: Dependency audit
        run: npm audit --audit-level=moderate

      - name: Production build
        run: npm run build
        env:
          GITHUB_PAGES: "true"
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_USE_ADMIN_EDGE_FUNCTIONS: ${{ secrets.VITE_USE_ADMIN_EDGE_FUNCTIONS }}
